# BYOK 算力中台 — QuantumNous/new-api
# 一键起飞：new-api + PostgreSQL + Redis，持久化卷
# 启动后：管理后台与 OpenAI 兼容 API 在 http://localhost:3001
# 生产环境请修改默认密码与 SESSION_SECRET

version: '3.4'

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3001:3000"
    volumes:
      - newapi_data:/data
      - newapi_logs:/app/logs
    environment:
      SQL_DSN: postgresql://root:newapi_pwd_change_me@postgres:5432/new-api
      REDIS_CONN_STRING: redis://redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: new-api-redis
    restart: always
    volumes:
      - newapi_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - new-api-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: newapi_pwd_change_me
      POSTGRES_DB: new-api
    volumes:
      - newapi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - new-api-network

volumes:
  newapi_data:
  newapi_logs:
  newapi_redis_data:
  newapi_pg_data:

networks:
  new-api-network:
    driver: bridge
