# 开发模式 — 仅基础设施
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: lobster-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lobster-qdrant-dev
    ports:
      - "6333:6333"
    restart: unless-stopped
