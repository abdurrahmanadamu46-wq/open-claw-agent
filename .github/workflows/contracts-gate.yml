name: contracts-gate

on:
  # Legacy manual gate. Main branch protection now uses mainline-gate-matrix.
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install contract validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema openapi-spec-validator

      - name: Validate contracts and schemas
        run: |
          python scripts/contracts/validate_contracts.py
