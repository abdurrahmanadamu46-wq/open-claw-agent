name: week3-e2e-live-gate

on:
  # Legacy manual gate. Main branch protection now uses mainline-gate-matrix.
  workflow_dispatch:

jobs:
  playwright-live-release:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run live release E2E gate (mock fallback disabled)
        working-directory: web
        env:
          CI: true
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET: github_actions_release_secret_1234567890
          NEW_API_BASE_URL: http://127.0.0.1:39999
          NEXT_PUBLIC_USE_MOCK: "false"
          NEXT_PUBLIC_DASHBOARD_ALLOW_MOCK_FALLBACK: "false"
          NEXT_PUBLIC_RUNTIME_ENV: production
          E2E_LIVE_USERNAME: admin
          E2E_LIVE_PASSWORD: change_me
        run: npm run test:e2e:release

      - name: Upload Playwright live report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-report
          path: web/playwright-report
          retention-days: 7
