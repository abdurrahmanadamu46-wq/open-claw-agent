name: module-path-gate

on:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      ai: ${{ steps.filter.outputs.ai }}
      edge: ${{ steps.filter.outputs.edge }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'
            ai:
              - 'dragon-senate-saas-v2/**'
            edge:
              - 'edge-runtime/**'

  backend-module:
    needs: detect
    if: ${{ needs.detect.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET: github_actions_release_secret_1234567890
      NEW_API_BASE_URL: http://127.0.0.1:39999
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run test:redaction
      - run: npm run test:resilience

  web-module:
    needs: detect
    if: ${{ needs.detect.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  ai-module:
    needs: detect
    if: ${{ needs.detect.outputs.ai == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dragon-senate-saas-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python scripts/test_stage2_chain.py
      - run: python scripts/test_run_dragon_team_baseline.py

  edge-module:
    needs: detect
    if: ${{ needs.detect.outputs.edge == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: edge runtime smoke
        run: |
          python - <<'PY'
          import importlib.util, pathlib
          p = pathlib.Path('edge-runtime/bbp_kernel.py')
          spec = importlib.util.spec_from_file_location('bbp_kernel', p)
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          points = mod.HumanMouseMimic().generate_trajectory(0, 0, 60, 60, 500)
          print(f'EDGE_RUNTIME_SMOKE_OK points={len(points)}')
          PY
