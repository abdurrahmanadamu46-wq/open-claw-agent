model:
  name: "Qwen/Qwen3-72B-Instruct"
  fallback: "deepseek-ai/DeepSeek-V3"

server:
  host: "0.0.0.0"
  port: 8000
  tensor_parallel_size: 2
  max_num_seqs: 256
  max_model_len: 32768
  dtype: "bfloat16"
  gpu_memory_utilization: 0.90

performance:
  max_num_batched_tokens: 8192
  enable_prefix_caching: true
  enable_chunked_prefill: true

routing:
  vllm_tasks:
    - "inkwriter"
    - "echoer"
    - "radar"
    - "followup"
    - "catcher"
  claude_tasks:
    - "commander"
    - "strategist"
    - "abacus"
